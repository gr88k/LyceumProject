<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Peak</title>
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class = "container">
        <div class = "top">
            <img class = "logo" src = "/css/data/testlogo2.png" alt = "Логотип" width = "250" height = "200">

            <div class = "info">
                <a href = "http://127.0.0.1:5000/about">О нас</a>
                <a href = "http://127.0.0.1:5000/catalog">Каталог</a>
                <a href = "about.html">Доставка</a>
            </div>

                <form method="GET" action="/catalog" class="search-form">
                    <input type="text"
                    name="q" 
                    placeholder="Поиск товаров..." 
                    value="{{ request.args.get('q', '') }}"
                    class="search-input">
                    <button type="submit" class="search-btn"><i class="fas fa-search"></i></button>
                </form>
                
                {% if current_user.is_authenticated %}
                    <a href = "/profile" class = "register">Профиль</a>
                {% else %}
                    <a href = "/register" class = "register">Регистрация</a>
                {% endif %}
        </div>

        <div class = "profileContainer">
            <button onclick="window.location.href='/catalog'" class="btn-back">←</button>
            <p>Здравствуйте, {{current_user.username}}!</p>
            <p>Редактирование профиля</p>

            <div class = "inputForms">
                    <form method="POST" action="/profile">
                        <div class="form-group">
                            <label for="username">Имя пользователя</label>
                            <input type="text" 
                            id="username" 
                            name="username" 
                            value="{{ user.username }}" 
                            required>
                        </div>

                        <div class="form-group">
                            <label for="email">Адрес электронной почты</label>
                            <input type="text" 
                            id="email" 
                            name="email" 
                            value="{{ user.email }}" 
                            required>
                        </div>

                        <div class="form-group">
                            <label for="tel">Номер телефона</label>
                            <input type="text" 
                            id="tel" 
                            name="tel" 
                            value="{{ user.tel }}" 
                            required>
                        </div>

                        <button type = "submit" class = "sbm-btn">Подтвердить</button>
                    </form>
                </div>
        </div>
    </div>
</body>
